; ======================================
; Rcon远程管理
; ======================================
[Rcon]

bEnabled=False
; 启用 Rcon 远程管理功能

Password=
; Rcon 连接密码

ListenPort=
; Rcon 服务监听的端口号（可使用服务器队列端口）

bUseBroadcastAddress=True
; 是否绑定到所有可用网络接口（True 则监听所有 IP）

ListenAddressOverride=0.0.0.0
; 当 bUseBroadcastAddress 为 False 时，指定绑定的具体 IP 地址

bAllowConsoleCommands=True
; 是否允许通过 Rcon 执行未知的控制台命令（True 则允许）

MaxPasswordAttempts=3
; 客户端在被封禁前允许的最大密码尝试次数

IncorrectPasswordBanTime=30
; 密码错误达到上限后，临时封禁该 IP 的时长（分钟）


; ======================================
; ======================================
; 游戏模式设置区域
; ======================================
; ======================================

; ======================================
; INSCheckpointGameMode占点模式
; ======================================
[/Script/Insurgency.INSCheckpointGameMode]


ObjectiveTotalEnemyRespawnMultiplierMin=2
; 当玩家人数最少时，敌方重生数量的乘数（1 = 正常）

ObjectiveTotalEnemyRespawnMultiplierMax=1
; 当玩家人数最多时，敌方重生数量的乘数（1 = 正常）

FinalCacheBotQuotaMultiplier=1.5
; 最终军械库任务中，AI 数量的额外乘数（1.5 倍）

bCounterAttackReinforce=True
; 是否在反击波次中启用 AI 增援（True 则反攻时会持续刷兵）

RoundTime=600
; 回合时间
; ======================================
; INSSurvivalGameMode幸存者
; ======================================
[/Script/Insurgency.INSSurvivalGameMode]

; RoundTimeExtensiom=300 
; 占领目标后回合延长的时长。

NumWaves=9
; 需要成功占领（包括撤离）的次数（注意：某些 NumWaves 值可能导致特定地图出现问题，这些情况尚未经过广泛测试）。

BotDPRRespawnFinal=0.2
; 在最终目标上机器人重生的比例

MaximumBotsPerCompletedObjective=1.5
; 在最多玩家数量时，每个已完成目标增加的机器人数量

BotRespawnDelay=1
; 重生死亡机器人之间的等待时间

bUseSpecialWaves=True
; 是否使用特殊波次？

SpecialWaveFrequency=2
; 如果启用了特殊波次，它们应该多久出现一次？

DefaultReinforcementWaves=8
; 每支队伍的起始增援波次数量。

CaptureBonusWaves=2
; 占领据点并且队伍军械库完好时获得的奖励波数

; ======================================
; INSOutpostGameMode防守模式
; ======================================
[/Script/Insurgency.INSOutpostGameMode]

MinimumBotsPerAdditionalObjective=2
; 在最少玩家数量时，每个额外的活跃目标增加的机器人数量

MaximumBotsPerAdditionalObjective=6
; 在最多玩家数量时，每个额外的活跃目标增加的机器人数量

bUseSpecialWaves=True
; 是否启用特殊波次

; ======================================
; ======================================
; 通用设置区域
; ======================================
; ======================================

; ======================================
; INSGameMode通用人机设置
; ======================================
[/script/insurgency.inscoopmode]

AIDifficulty=0.5
; AI 难度系数，范围 0.0 ~ 1.0

RoundLimit=5
;  最大局数

MinimumEnemies=5
; 地图上同时存在的最低敌方 AI 数量

MaximumEnemies=40
; 地图上同时存在的最高敌方 AI 数量

MaxPlayersToScaleEnemyCount=8
; 超过此玩家数量后，敌方数量不再按比例增加（指定人数以上固定为 MaximumEnemies）

InitialSupply=30
; 玩家初始补给点数（可购买武器的点数）

MaximumSupply=255
; 玩家最多可获得的补给点数上限

bSupplyGainEnabled=True
; 是否允许在游戏中通过杀敌/占点等行为获得额外补给

bAwardSupplyInstantly=True
; 获得补给时是否立即到账（False 则需等到回合结束）

SupplyGainFrequency=200
; 获得补给所需的分数阈值

FriendlyFireReflect=0
; 反弹友军伤害的比例（0 = 不反弹，1 = 全额反弹）

FriendlyFireModifier=0.2
; 友军伤害的倍率（0.1 = 造成 10% 伤害）

MinimumTotalFriendlyFireDamageToReflect=150
; 触发反弹所需的最低累积友军伤害值（单位：伤害量）


; ======================================
; INSGameMode通用游戏设置
; ======================================
[/Script/Insurgency.INSGameMode]

bKillFeed=True
; 是否在屏幕左上角显示击杀信息（谁杀了谁）

bKillerInfoRevealDistance=True
; 死亡回放/击杀信息中是否显示击杀距离

bKillerInfo=True
; 是否显示击杀者信息（武器、名字等）

TeamKillLimit=3
; 玩家被自动踢出前允许的最大队友击杀次数

TeamKillGrace=0.2
; 两次队友击杀之间的“宽限”时间（秒），在此时间内连续击杀才累加

TeamKillReduceTime=90
; 经过多少秒后，队友击杀计数减少 1

bDeadSay=True
; 是否允许阵亡玩家发送文字消息给所有玩家（包括活着的）

bDeadSayTeam=True
; 是否允许阵亡玩家在队伍频道说话（仅限同队活着的玩家听到）

MinimumTotalFriendlyFireDamageToReflect=50
; 全局：触发友军伤害反弹所需的最低累积伤害（仅当反射开启时有效）

; ======================================
; INSMultiplayerMode通用多人设置
; ======================================
[/Script/Insurgency.INSMultiplayerMode]
PostRoundTime=8
; 回合休息时间

Wintime=2
; 胜利画面时间

PostGameTime=10
;  赛后休息时间

GameStartingIntermissionTime=5
; 赛前准备时间

FriendlyFireReflect=0.1
; 友军伤害反弹比例（0.1 = 反弹 10% 伤害给攻击者）

FriendlyFireModifier=0.1
; 友军伤害倍率（0.1 = 只造成 10% 伤害）

InitialSupply=17
; 玩家初始补给点数（PVP 模式常用 15~20）

MaximumSupply=80
; 玩家最大可获得的补给点数上限

bSupplyGainEnabled=True
; 是否允许在 PVP 模式中获得额外补给（通过击杀/占点）

bAwardSupplyInstantly=True
; 获得补给时是否立即到账

IdleLimit=150
; 常规挂机超时时间

IdleLimitLowReinforcements=45
; 最后一人时限制挂机时间

SupplyGainFrequency=150
; PVP 模式中，获得补给所需的分数阈值（每 150 分奖励一次）

bBots=False
; 是否在服务器中启用机器人（False = 仅玩家真人）

BotQuota=5
; 当 bBots=True 时，每队机器人的数量（此处因 bBots=False 不生效）

; ======================================
; VoteIssueKick投票
; ======================================
[/Script/Insurgency.VoteIssueKick]
VotePassRatio=0.5
; 投票通过所需的最低赞成比例（0.5 = 超过半数即通过）



; =====================================
; =====================================
; Mutators Settings 单独变异设置，前面放官方变异数值，后面放mod数值
; =====================================
; =====================================

; =====================================
; ArmsRace军备竞赛
; =====================================
[/Script/Insurgency.Mutator_ArmsRace]
bItemsDrop=FALSE          
; 玩家能否掉落物品
bEnablePickupItems=FALSE  
; 允许拾取地图上的物品
bScorePoints=TRUE         
; 是否覆盖团队得分逻辑
PenaltyPoints=2           
; 惩罚扣分数量

; =====================================
; HeadshotOnly仅限爆头
; =====================================
[/Script/Insurgency.Mutator_HeadshotOnly]
bCheckMeleeDamage=false   
; 近战攻击是否也要检查爆头

; =====================================
; HotPotato烫手山芋
; =====================================
[/Script/Insurgency.Mutator_HotPotato]
bIgnoreHeadshots=false    
; 爆头击杀是否不触发掉雷
bBotsOnly=false           
; 仅机器人死亡掉雷

; =====================================
; Vampirism吸血鬼
; =====================================
[/Script/Insurgency.Mutator_Vampirism]
bCountFriendlyFire=false  
; 队友伤害是否也算回血
MaxHealth=300            
; 吸血获得的最大血量上限